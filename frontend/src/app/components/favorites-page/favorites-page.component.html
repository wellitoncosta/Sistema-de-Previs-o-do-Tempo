<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-item" routerLink="/dashboard" title="{{ 'NAV.DASHBOARD' | translate }}">
      <i class="bi bi-grid"></i>
    </div>
    <div class="sidebar-item active" routerLink="/favorites" title="{{ 'NAV.FAVORITES' | translate }}">
      <i class="bi bi-star-fill"></i>
    </div>
    <div class="sidebar-item" routerLink="/profile" title="{{ 'NAV.PROFILE' | translate }}">
      <i class="bi bi-person"></i>
    </div>
    <div class="sidebar-item" routerLink="/settings" title="{{ 'NAV.SETTINGS' | translate }}">
      <i class="bi bi-gear"></i>
    </div>
    <div class="sidebar-item" routerLink="/export" routerLinkActive="active" title="{{ 'NAV.EXPORT' | translate }}">
      <i class="bi bi-file-earmark-arrow-down"></i>
    </div>
    <div style="margin-top: auto;" class="sidebar-item logout" (click)="logout()" title="{{ 'NAV.LOGOUT' | translate }}">
      <i class="bi bi-box-arrow-left"></i>
    </div>
  </aside>

  <main class="main-content">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
      <h1 style="font-size: 2.5rem; font-weight: 800; margin: 0;">Minhas Cidades <span style="color: var(--primary-blue);">Favoritas</span></h1>
      
      <div style="display: flex; gap: 2rem; align-items: center;">
        <div style="display: flex; align-items: center; gap: 1.2rem; cursor: pointer;" routerLink="/profile">
          <span style="font-weight: 700; font-size: 1rem; color: var(--text-dim);">{{ 'COMMON.CONTROL_PANEL' | translate }}</span>
          <div class="profile-circle">
            <i class="bi bi-person-fill"></i>
          </div>
        </div>
      </div>
    </header>

    <div class="favorites-grid">
      <div *ngFor="let fav of cidadesFavoritas" class="favorite-card" (click)="verClima(fav.cidade)">
        <div class="card-header">
          <h2 class="city-name">{{ fav.cidade }}</h2>
          <button class="btn-remove" (click)="removerFavorito(fav.cidade, $event)">
            <i class="bi bi-star-fill"></i>
          </button>
        </div>
        
        <div class="card-body">
          <div class="temp-section">
            <span class="temp-val">{{ fav.temperatura | number:'1.0-0' }}°</span>
            <span class="weather-desc">{{ fav.descricao_clima }}</span>
          </div>
          <div class="view-details">
            Ver detalhes <i class="bi bi-arrow-right"></i>
          </div>
        </div>
      </div>

      <div *ngIf="!loading && cidadesFavoritas.length === 0" class="empty-state">
        <i class="bi bi-star" style="font-size: 4rem; opacity: 0.2; margin-bottom: 1.5rem;"></i>
        <h3>{{ 'FAVORITES.NO_FAVORITES_TITLE' | translate }}</h3>
        <p>{{ 'FAVORITES.NO_FAVORITES_BODY' | translate }}</p>
        <button class="btn-primary" style="width: auto; padding: 1rem 2rem; margin-top: 2rem;" routerLink="/dashboard">
          {{ 'FAVORITES.GO_TO_DASHBOARD' | translate }}
        </button>
      </div>

      <div *ngIf="loading" class="loading-state">
        <div class="spinner"></div>
      </div>
    </div>
  </main>
</div>
