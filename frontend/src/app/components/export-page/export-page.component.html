<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-item" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" title="{{ 'NAV.DASHBOARD' | translate }}">
      <i class="bi bi-grid-fill"></i>
    </div>
    <div class="sidebar-item" routerLink="/favorites" routerLinkActive="active" title="{{ 'NAV.FAVORITES' | translate }}">
      <i class="bi bi-star"></i>
    </div>
    <div class="sidebar-item" routerLink="/profile" routerLinkActive="active" title="{{ 'NAV.PROFILE' | translate }}">
      <i class="bi bi-person"></i>
    </div>
    <div class="sidebar-item" routerLink="/settings" routerLinkActive="active" title="{{ 'NAV.SETTINGS' | translate }}">
      <i class="bi bi-gear"></i>
    </div>
    <div class="sidebar-item" routerLink="/export" routerLinkActive="active" title="{{ 'NAV.EXPORT' | translate }}">
      <i class="bi bi-file-earmark-arrow-down"></i>
    </div>
    <div style="margin-top: auto;" class="sidebar-item logout" (click)="logout()" title="{{ 'NAV.LOGOUT' | translate }}">
      <i class="bi bi-box-arrow-left"></i>
    </div>
  </aside>

  <main class="main-content">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <div>
        <h2 style="margin: 0; font-size: 1.8rem; font-weight: 800;">{{ 'EXPORT.TITLE' | translate }}</h2>
        <p style="margin: 0.5rem 0 0; color: var(--text-dim);">{{ 'EXPORT.SUBTITLE' | translate }}</p>
      </div>
      <button class="theme-toggle-circle" (click)="themeService.toggleTheme()">
        <i class="bi" [ngClass]="themeService.darkMode ? 'bi-sun' : 'bi-moon-stars'"></i>
      </button>
    </header>

    <div class="export-card widget-box" style="max-width: 640px;">
      <div class="widget-title" style="gap: 1rem;">
        <i class="bi bi-file-earmark-arrow-down" style="color: var(--primary);"></i>
        <span>{{ 'EXPORT.HISTORY_EXPORT' | translate }}</span>
      </div>
      <p style="color: var(--text-dim); margin-top: 1rem;">{{ 'EXPORT.DESCRIPTION' | translate }}</p>
      <button class="btn-search-blue" (click)="exportCsv()">{{ 'EXPORT.BUTTON' | translate }}</button>
      <div style="margin-top: 1.5rem; color: var(--text-dim);">
        <p style="margin: 0;">{{ 'EXPORT.NOTE_1' | translate }}</p>
        <p style="margin: 0.5rem 0 0;">{{ 'EXPORT.NOTE_2' | translate }}</p>
      </div>
    </div>
  </main>
</div>
