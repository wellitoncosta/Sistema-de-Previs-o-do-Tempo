<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-item" routerLink="/dashboard" title="{{ 'NAV.DASHBOARD' | translate }}">
      <i class="bi bi-grid"></i>
    </div>
    <div class="sidebar-item" routerLink="/favorites" title="{{ 'NAV.FAVORITES' | translate }}">
      <i class="bi bi-star"></i>
    </div>
    <div class="sidebar-item" routerLink="/profile" title="{{ 'NAV.PROFILE' | translate }}">
      <i class="bi bi-person"></i>
    </div>
    <div class="sidebar-item" routerLink="/settings" title="{{ 'NAV.SETTINGS' | translate }}">
      <i class="bi bi-gear-fill"></i>
    </div>
    <div class="sidebar-item" routerLink="/export" routerLinkActive="active" title="{{ 'NAV.EXPORT' | translate }}">
      <i class="bi bi-file-earmark-arrow-down"></i>
    </div>
    <div style="margin-top: auto;" class="sidebar-item logout" (click)="logout()" title="{{ 'NAV.LOGOUT' | translate }}">
      <i class="bi bi-box-arrow-left"></i>
    </div>
  </aside>

  <main class="main-content">
    <div class="main-wrapper" style="background: none; padding: 0;">
      <div class="glass-container" style="max-width: 800px; width: 100%; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
          <h2 style="-webkit-text-fill-color: var(--text-main); font-size: 2rem;">{{ 'SETTINGS.TITLE' | translate }}</h2>
          <p class="text-muted">{{ 'SETTINGS.SUBTITLE' | translate }}</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
          <!-- Coluna 1: Dados Pessoais -->
          <section>
            <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem;"><i class="bi bi-person-badge"></i> {{ 'SETTINGS.PERSONAL_INFO' | translate }}</h3>
            <div class="widget-card" style="background: var(--glass); border: none;">
              <div class="form-group">
                <label class="text-muted" style="font-size: 0.8rem;">{{ 'SETTINGS.FULL_NAME' | translate }}</label>
                <input type="text" name="nome" [(ngModel)]="user.nome" placeholder="{{ 'SETTINGS.YOUR_NAME' | translate }}">
              </div>
              <div class="form-group">
                <label class="text-muted" style="font-size: 0.8rem;">{{ 'SETTINGS.EMAIL' | translate }}</label>
                <input type="email" name="email" [(ngModel)]="user.email" placeholder="{{ 'SETTINGS.YOUR_EMAIL' | translate }}">
              </div>
              <div class="form-group">
                <label class="text-muted" style="font-size: 0.8rem;">{{ 'SETTINGS.NEW_PASSWORD' | translate }}</label>
                <input type="password" name="senha" [(ngModel)]="user.senha" placeholder="{{ 'SETTINGS.PASSWORD_PLACEHOLDER' | translate }}">
              </div>
            </div>
          </section>

          <!-- Coluna 2: Preferências do Sistema -->
          <section>
            <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem;"><i class="bi bi-sliders"></i> {{ 'SETTINGS.PREFERENCES' | translate }}</h3>
            <div class="widget-card" style="background: var(--glass); border: none;">
              <div class="form-group">
                <label class="text-muted" style="font-size: 0.8rem;">{{ 'SETTINGS.LANGUAGE' | translate }}</label>
                <select [(ngModel)]="preferences.idioma" (change)="onIdiomaChange()" style="width: 100%; padding: 0.8rem; border-radius: 12px; background: var(--bg-sidebar); color: inherit; border: 1px solid var(--border);">
                  <option value="pt">Português (PT)</option>
                  <option value="en">English (US)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="text-muted" style="font-size: 0.8rem;">{{ 'SETTINGS.TEMPERATURE_UNIT' | translate }}</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                  <button type="button" [class.btn-primary]="preferences.unidade === 'celsius'" (click)="preferences.unidade = 'celsius'; onUnidadeChange()" style="flex: 1; padding: 0.5rem;">°C</button>
                  <button type="button" [class.btn-primary]="preferences.unidade === 'fahrenheit'" (click)="preferences.unidade = 'fahrenheit'; onUnidadeChange()" style="flex: 1; padding: 0.5rem;">°F</button>
                </div>
              </div>
              <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; margin-top: 1rem;">
                <label class="text-muted">{{ 'SETTINGS.NOTIFICATIONS' | translate }}</label>
                <input type="checkbox" [(ngModel)]="preferences.notificacoes" style="width: auto;">
              </div>
            </div>
          </section>
        </div>

        <div class="message" [ngClass]="{'message-error': mensagem && !mensagem.includes('sucesso'), 'message-success': mensagem && mensagem.includes('sucesso')}" *ngIf="mensagem" style="margin-top: 1.5rem;">
          {{ mensagem }}
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button type="button" class="btn-primary" style="flex: 1;" (click)="abrirVerificacao()">
            {{ 'SETTINGS.APPLY_CHANGES' | translate }}
          </button>
          <button type="button" class="btn-secondary" style="flex: 1;" (click)="goBack()">
            {{ 'SETTINGS.CANCEL' | translate }}
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal de Verificação de Segurança -->
  <div class="modal-overlay" *ngIf="showVerifyModal">
    <div class="modal-content glass-container" style="max-width: 400px; padding: 2.5rem;">
      <h3 style="margin-bottom: 1rem; -webkit-text-fill-color: var(--text-main);">{{ 'SETTINGS.SECURITY_CHECK' | translate }}</h3>
      <p class="text-muted" style="margin-bottom: 1.5rem;">{{ 'SETTINGS.SECURITY_CHECK_TEXT' | translate }}</p>
      
      <div class="form-group">
        <input type="password" [(ngModel)]="verifyPassword" placeholder="{{ 'SETTINGS.CURRENT_PASSWORD' | translate }}" style="background: rgba(0,0,0,0.2);">
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 2rem;">
        <button class="btn-primary" style="flex: 1;" (click)="confirmarESalvar()">{{ 'SETTINGS.CONFIRM' | translate }}</button>
        <button class="btn-secondary" style="flex: 1;" (click)="showVerifyModal = false; verifyPassword = ''">{{ 'SETTINGS.CANCEL' | translate }}</button>
      </div>
    </div>
  </div>
</div>
